# FanHub local infrastructure — one `docker compose up -d` brings up everything.
# Postgres (DB), Redis (cache/ratelimit/chart), MinIO (S3-compatible storage).
services:
  postgres:
    image: postgres:16-alpine
    container_name: fanhubnew-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: fanhub
      POSTGRES_PASSWORD: fanhub_dev_pw
      POSTGRES_DB: fanhub
    ports:
      # host 5433 -> container 5432 (avoids the older /Projects/FanHub stack on 5432)
      - "5433:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fanhub -d fanhub"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: fanhubnew-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      # host 6380 -> container 6379
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: fanhubnew-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: fanhub
      MINIO_ROOT_PASSWORD: fanhub_dev_pw
    ports:
      - "9002:9000" # S3 API   (host 9002 -> container 9000)
      - "9003:9001" # web console (host 9003 -> container 9001)
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Creates the private content bucket on startup, then exits.
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 fanhub fanhub_dev_pw &&
      mc mb --ignore-existing local/fanhub-content &&
      mc anonymous set none local/fanhub-content &&
      echo 'bucket fanhub-content ready (private)';
      "

volumes:
  pg_data:
  redis_data:
  minio_data:
